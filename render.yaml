# Blueprint de Render para el backend (NestJS + Prisma + PostgreSQL).
# Render lo detecta en la raíz del repo. Crea la base de datos y el servicio
# web con sus variables ya cableadas. Importar en: Render → New → Blueprint.
#
# Este blueprint es la config CORRECTA del servicio: compila en el build y
# arranca con `node dist/main` (el JS ya compilado). NO usa `yarn start` ni
# `nest start`, que recompilarían TypeScript en cada arranque y agotan la
# memoria del plan free (~256 MB de heap) provocando OOM al desplegar.

databases:
  - name: tu-chamba-db
    databaseName: tu_chamba
    plan: free

services:
  - type: web
    name: tu-chamba-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    # Rama que Render despliega. Producción vive en main (develop se mergea a
    # main). Cámbiala si tu servicio de producción sigue otra rama.
    branch: main
    # Las migraciones van en el build: en el plan free de Render, preDeployCommand
    # NO se ejecuta. migrate deploy es idempotente, así que correrlo en cada build
    # es seguro y garantiza que las tablas existan.
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/main
    healthCheckPath: /api/health
    envVars:
      # Conexión a la base de datos: la inyecta Render desde la DB de arriba.
      - key: DATABASE_URL
        fromDatabase:
          name: tu-chamba-db
          property: connectionString
      # Secreto JWT: Render genera un valor aleatorio seguro.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Dominios de los frontends (web y admin). Se rellena a mano en el dashboard.
      - key: CORS_ORIGINS
        sync: false
      # Google Indexing API (service account con acceso en Search Console).
      # Se rellenan a mano en el dashboard; sin ellas la integración es no-op.
      - key: GOOGLE_INDEXING_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_INDEXING_PRIVATE_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
      # Tope de heap explícito para el build: `nest build` (tsc) necesita
      # ~350 MB por los tipos generados de Prisma, pero en una máquina de
      # 512 MB Node auto-limita el heap a ~256 MB → OOM. Este techo lo evita.
      # Es solo un techo (no reserva memoria); inofensivo en runtime.
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
